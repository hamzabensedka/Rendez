# Docker Compose is OPTIONAL - Not required for development
# We use Supabase for Postgres (cloud) and Upstash for Redis (cloud)
# 
# Only use this if you want to run Postgres/Redis locally instead of cloud services
# 
# To use: docker-compose up -d
# To stop: docker-compose down

services:
  postgres:
    image: postgres:16
    container_name: planity-postgres
    environment:
      POSTGRES_USER: planity
      POSTGRES_PASSWORD: planity_dev
      POSTGRES_DB: planity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planity"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: planity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
